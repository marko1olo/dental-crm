<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>Dental CRM offline</title>
    <style>
      :root {
        color: #17211f;
        background: #f8f5ef;
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        background: #fffdf9;
        border: 1px solid #d8e3dd;
        border-radius: 8px;
        max-width: 560px;
        padding: 22px;
      }

      h1 {
        font-size: 24px;
        margin: 0 0 10px;
      }

      p {
        color: #586661;
        line-height: 1.5;
        margin: 0 0 14px;
      }

      a {
        background: #0f766e;
        border-radius: 8px;
        color: #fff;
        display: inline-flex;
        font-weight: 800;
        min-height: 40px;
        align-items: center;
        padding: 0 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет связи с сервером</h1>
      <p>Откройте уже загруженное приложение и продолжайте локальный черновик. Сохранения приема будут отправлены на сервер после восстановления связи.</p>
      <a href="/#visit">Вернуться к приему</a>
    </main>
  </body>
</html>
